<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">

<title>Copa do Mundo 2026 - 2ª Fase</title>
</head>

<body>

<h1>Copa do Mundo 2026 - 2ª FASE</h1>

<button id="btn-primeira-fase" class="buttom">⚽ 1ª FASE</button>

<div class="copa-container">

    <!-- OITAVAS -->
    <div class="grupo-card">
        <div class="grupo-titulo">Oitavas de Final</div>

        <div class="organization"><h2><span class="fi fi-mx bandeira"></span> × <span class="fi fi-kr bandeira"></span></h2></div>
        <div class="organization"><h2><span class="fi fi-ca bandeira"></span> × <span class="fi fi-ch bandeira"></span></h2></div>
        <div class="organization"><h2><span class="fi fi-br bandeira"></span> × <span class="fi fi-ma bandeira"></span></h2></div>
        <div class="organization"><h2><span class="fi fi-us bandeira"></span> × <span class="fi fi-au bandeira"></span></h2></div>
        <div class="organization"><h2><span class="fi fi-es bandeira"></span> × <span class="fi fi-jp bandeira"></span></h2></div>
        <div class="organization"><h2><span class="fi fi-de bandeira"></span> × <span class="fi fi-nl bandeira"></span></h2></div>
        <div class="organization"><h2><span class="fi fi-fr bandeira"></span> × <span class="fi fi-no bandeira"></span></h2></div>
        <div class="organization"><h2><span class="fi fi-ar bandeira"></span> × <span class="fi fi-pt bandeira"></span></h2></div>
    </div>

    <!-- QUARTAS -->
    <div class="grupo-card">
        <div class="grupo-titulo">Quartas de Final</div>

        <div class="organization"><h2><span id="q1-casa" class="fi bandeira"></span> × <span id="q1-fora" class="fi bandeira"></span></h2></div>
        <div class="organization"><h2><span id="q2-casa" class="fi bandeira"></span> × <span id="q2-fora" class="fi bandeira"></span></h2></div>
        <div class="organization"><h2><span id="q3-casa" class="fi bandeira"></span> × <span id="q3-fora" class="fi bandeira"></span></h2></div>
        <div class="organization"><h2><span id="q4-casa" class="fi bandeira"></span> × <span id="q4-fora" class="fi bandeira"></span></h2></div>

        <details class="details">
            <summary>RESULTADOS</summary>
            <div class="info-jogo">Q1: ? x ?</div>
            <div class="info-jogo">Q2: ? x ?</div>
            <div class="info-jogo">Q3: ? x ?</div>
            <div class="info-jogo">Q4: ? x ?</div>
        </details>
    </div>

    <!-- SEMIFINAIS -->
    <div class="grupo-card">
        <div class="grupo-titulo">Semifinais</div>

        <div class="organization"><h2><span id="s1-casa" class="fi bandeira"></span> × <span id="s1-fora" class="fi bandeira"></span></h2></div>
        <div class="organization"><h2><span id="s2-casa" class="fi bandeira"></span> × <span id="s2-fora" class="fi bandeira"></span></h2></div>

        <details class="details">
            <summary>RESULTADOS</summary>
            <div class="info-jogo">Semi 1: ? x ?</div>
            <div class="info-jogo">Semi 2: ? x ?</div>
        </details>
    </div>

    <!-- FINAL -->
    <div class="grupo-card">
        <div class="grupo-titulo">Final</div>

        <div class="organization">
            <h2>
                <span id="f-casa" class="fi bandeira"></span> ×
                <span id="f-fora" class="fi bandeira"></span>
            </h2>
        </div>

        <div class="selecao" style="justify-content:center; margin-top:20px; font-size:1.4rem;">
        </div>
        <details class="details">
            <summary>RESULTADOS</summary>
            <div class="info-jogo">🏆CAMPEÂO!<span id="fi bandeira"></span>🏆</div>
        </details>
    </div>
</div>

<script src="js.js"></script>

</body>
</html>
